# ==============================================================================
# deploy-external-db-ocp.yaml
#
# Despliegue de la base de datos PostgreSQL 15 externa en OpenShift
# Namespace: f1-tickets-db  (independiente del legacy f1-tickets)
#
# ANTES DE APLICAR:
#   1. Reemplaza <STORAGE_CLASSNAME> con el valor correcto:
#      - CRC  → crc-csi-hostpath-provisioner
#      - OCP  → kubevirt-csi-infra-default
#   2. Aplica el manifiesto:
#      oc apply -f deploy-external-db-ocp.yaml
#   3. Luego restaura el dump con:
#      ./03-restore-dump-ocp.sh <dump_file>
#
# ACCESO INTERNO DESDE OTRAS APLICACIONES EN OCP:
#   Host: f1-external-db.f1-tickets-db.svc.cluster.local
#   Port: 5432
#   User: appuser  |  Password: apppassword  |  DB: appdb
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Namespace f1-tickets-db
# ------------------------------------------------------------------------------
apiVersion: project.openshift.io/v1
kind: ProjectRequest
metadata:
  name: f1-tickets-db
displayName: F1 Tickets — External Database

---
# ------------------------------------------------------------------------------
# 2. ClusterRoleBinding — permite correr como postgres (anyuid)
# ------------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: f1-tickets-db-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
- kind: ServiceAccount
  name: default
  namespace: f1-tickets-db

---
# ------------------------------------------------------------------------------
# 3. Secret — credenciales PostgreSQL (idénticas a la legacy para compatibilidad)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: f1-external-db-secret
  namespace: f1-tickets-db
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppassword
  POSTGRES_DB: appdb
  # Connection string lista para usar en apps modernas:
  DATABASE_URL: "postgresql://appuser:apppassword@f1-external-db.f1-tickets-db.svc.cluster.local:5432/appdb"

---
# ------------------------------------------------------------------------------
# 4. PersistentVolumeClaim — datos de la base de datos externa (5 Gi)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: f1-external-db-data
  namespace: f1-tickets-db
spec:
  storageClassName: ocs-storagecluster-cephfs
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# ------------------------------------------------------------------------------
# 5. ConfigMap — script de inicialización de la BD
#    Crea el usuario y la base de datos si no existen (primer arranque)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: f1-external-db-init
  namespace: f1-tickets-db
data:
  init-user.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        SELECT 1;
    EOSQL
    echo "✓ Base de datos lista."

---
# ------------------------------------------------------------------------------
# 6. Deployment — PostgreSQL 15 standalone
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-external-db
  namespace: f1-tickets-db
  labels:
    app: f1-external-db
    tier: database
    version: "15"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: f1-external-db
  strategy:
    type: Recreate       # Recreate es obligatorio con ReadWriteOnce
  template:
    metadata:
      labels:
        app: f1-external-db
        tier: database
    spec:
      containers:
      - name: postgresql
        image: docker.io/library/postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgresql
        envFrom:
        - secretRef:
            name: f1-external-db-secret
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        - name: db-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - appuser
            - -d
            - appdb
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - appuser
            - -d
            - appdb
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: f1-external-db-data
      - name: db-init
        configMap:
          name: f1-external-db-init
          defaultMode: 0755

---
# ------------------------------------------------------------------------------
# 7. Service — expone PostgreSQL internamente en el cluster
#    Acceso desde otros namespaces:
#      f1-external-db.f1-tickets-db.svc.cluster.local:5432
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: f1-external-db
  namespace: f1-tickets-db
  labels:
    app: f1-external-db
spec:
  selector:
    app: f1-external-db
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
  type: ClusterIP

---
# ------------------------------------------------------------------------------
# 8. NetworkPolicy — controla qué namespaces pueden acceder a la BD
#    Permite: f1-tickets-db (mismo NS) + f1-tickets (legacy) + f1-tickets-modern
#    Deniega: cualquier otro namespace por defecto
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: f1-external-db-access
  namespace: f1-tickets-db
spec:
  podSelector:
    matchLabels:
      app: f1-external-db
  policyTypes:
  - Ingress
  ingress:
  # Acceso desde el mismo namespace (Jobs de restore, etc.)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: f1-tickets-db
  # Acceso desde la app legacy (solo lectura en producción — control por app)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: f1-tickets
    ports:
    - protocol: TCP
      port: 5432
  # Acceso desde la futura app modernizada
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: f1-tickets-modern
    ports:
    - protocol: TCP
      port: 5432
