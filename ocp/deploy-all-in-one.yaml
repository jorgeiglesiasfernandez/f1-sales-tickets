# ==============================================================================
# f1-sales-tickets — Full deployment on OpenShift (CRC or OCP)
#
# BEFORE IMPORTING:
#   1. Replace <TU_USUARIO> with your GitHub username in the BuildConfig.
#   2. Replace <STORAGE_CLASSNAME> with the appropriate value:
#      crc-csi-hostpath-provisioner  (CRC)
#      kubevirt-csi-infra-default    (OCP / HCP)
#   3. Cluster-scoped resources (Project, ClusterRoleBinding) require a
#      kubeadmin session; all other resources can be created as developer.
#
# HOW TO IMPORT:
#   oc apply -f deploy-all-in-one.yaml
#   — or —
#   Web console → "+" icon (Import YAML) → paste the full file.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Project — namespace f1-tickets
#    Requires kubeadmin session (or a developer with self-provisioner permissions)
# ------------------------------------------------------------------------------
apiVersion: project.openshift.io/v1
kind: ProjectRequest
metadata:
  name: f1-tickets
displayName: F1 Sales Tickets

---
# ------------------------------------------------------------------------------
# 2. ClusterRoleBinding — allows the pod to run as root (anyuid SCC)
#    Requires kubeadmin session
# ------------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: f1-tickets-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
- kind: ServiceAccount
  name: default
  namespace: f1-tickets

---
# ------------------------------------------------------------------------------
# 3. ClusterRoleBinding — allows anonymous users to trigger webhooks
#    Required so GitHub can call the BuildConfig webhook endpoint without auth.
#    Requires kubeadmin session
# ------------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: f1-webhook-anonymous
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:webhook
subjects:
- kind: User
  name: system:anonymous
  apiGroup: rbac.authorization.k8s.io

---
# ------------------------------------------------------------------------------
# 5. Secret — PostgreSQL credentials
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: f1-db-secret
  namespace: f1-tickets
type: Opaque
stringData:
  PGSQL_USER: appuser
  PGSQL_PASSWORD: apppassword
  PGSQL_DB: appdb

---
# ------------------------------------------------------------------------------
# 6. PersistentVolumeClaim — PostgreSQL data directory (2 Gi)
#    Stays in Pending until the Deployment mounts the volume — this is expected.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: f1-pgsql-data
  namespace: f1-tickets
spec:
  storageClassName: <STORAGE_CLASSNAME>
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# ------------------------------------------------------------------------------
# 7. ImageStream — target for the image built by the BuildConfig
# ------------------------------------------------------------------------------
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: f1-tickets
  namespace: f1-tickets

---
# ------------------------------------------------------------------------------
# 8. BuildConfig — builds the image from the GitHub repository
# ------------------------------------------------------------------------------
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: f1-tickets
  namespace: f1-tickets
spec:
  triggers:
  - type: Generic
    generic:
      secret: f1ocp2026
      allowEnv: false
  - type: ImageChange
  source:
    type: Git
    git:
      uri: https://github.com/jorgeiglesiasfernandez/f1-sales-tickets.git
      ref: main
    contextDir: "."
  strategy:
    type: Docker
    dockerStrategy: {}
  output:
    to:
      kind: ImageStreamTag
      name: f1-tickets:latest

---
# ------------------------------------------------------------------------------
# 9. Deployment — runs the WildFly 18 + PostgreSQL 15 monolith
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-tickets
  namespace: f1-tickets
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"f1-tickets:latest","namespace":"f1-tickets"},
        "fieldPath":"spec.template.spec.containers[?(@.name==\"f1-tickets\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: f1-tickets
  template:
    metadata:
      labels:
        app: f1-tickets
    spec:
      containers:
      - name: f1-tickets
        image: image-registry.openshift-image-registry.svc:5000/f1-tickets/f1-tickets:latest
        ports:
        - containerPort: 8080
        - containerPort: 9990
        envFrom:
        - secretRef:
            name: f1-db-secret
        volumeMounts:
        - name: pgsql-data
          mountPath: /var/lib/pgsql/15/data
          subPath: data
        readinessProbe:
          httpGet:
            path: /f1-tickets
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /f1-tickets
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 15
      volumes:
      - name: pgsql-data
        persistentVolumeClaim:
          claimName: f1-pgsql-data

---
# ------------------------------------------------------------------------------
# 10. Service — exposes HTTP port 8080 internally
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: f1-tickets
  namespace: f1-tickets
spec:
  selector:
    app: f1-tickets
  ports:
  - name: http
    port: 8080
    targetPort: 8080

---
# ------------------------------------------------------------------------------
# 11. Route — exposes the app externally
#    TLS edge termination: the router handles HTTPS and forwards HTTP to the pod.
#    CRC:  http://f1-tickets-f1-tickets.apps-crc.testing/f1-tickets
#    OCP:  https://f1-tickets-f1-tickets.apps.<cluster>/f1-tickets
# ------------------------------------------------------------------------------
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: f1-tickets
  namespace: f1-tickets
spec:
  to:
    kind: Service
    name: f1-tickets
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
