# ==============================================================================
# 01-secrets.yaml — PostgreSQL credentials
#
# ⚠ Change the values before applying in production.
# Apply: oc apply -f deploy/ocp/manifests/01-secrets.yaml
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: f1-db-secret
  namespace: f1-tickets
type: Opaque
stringData:
  PGSQL_USER: appuser
  PGSQL_PASSWORD: apppassword
  PGSQL_DB: appdb
