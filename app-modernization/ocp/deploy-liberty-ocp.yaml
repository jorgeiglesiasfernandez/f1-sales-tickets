# ==============================================================================
# deploy-liberty-ocp.yaml
#
# Despliegue de la aplicación modernizada F1-Tickets en Liberty en OpenShift
# Namespace: f1-tickets-modern
#
# ANTES DE APLICAR:
#   1. Reemplaza <TU_USUARIO> con tu usuario de GitHub en el BuildConfig.
#   2. Reemplaza <STORAGE_CLASSNAME> con el valor correcto:
#      - CRC  → crc-csi-hostpath-provisioner
#      - OCP  → kubevirt-csi-infra-default
#   3. Asegúrate de que la BD externa está desplegada en f1-tickets-db
#      (ver db-migration/ocp/deploy-external-db-ocp.yaml)
#   4. Aplica el manifiesto:
#      oc apply -f deploy-liberty-ocp.yaml
#
# ACCESO:
#   CRC:  https://f1-tickets-modern-f1-tickets-modern.apps-crc.testing/f1-tickets
#   OCP:  https://f1-tickets-modern-f1-tickets-modern.apps.<cluster>/f1-tickets
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Project — namespace f1-tickets-modern
# ------------------------------------------------------------------------------
apiVersion: project.openshift.io/v1
kind: ProjectRequest
metadata:
  name: f1-tickets-modern
displayName: F1 Tickets — Liberty (Modernized)

---
# ------------------------------------------------------------------------------
# 2. ClusterRoleBinding — permite correr como usuario no-root (Liberty usa 1001)
# ------------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: f1-tickets-modern-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
- kind: ServiceAccount
  name: default
  namespace: f1-tickets-modern

---
# ------------------------------------------------------------------------------
# 3. ClusterRoleBinding — permite a GitHub lanzar webhooks sin autenticación
# ------------------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: f1-tickets-modern-webhook-anonymous
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:webhook
subjects:
- kind: User
  name: system:anonymous
  apiGroup: rbac.authorization.k8s.io

---
# ------------------------------------------------------------------------------
# 4. Secret — credenciales de la BD externa (mismas que f1-tickets-db)
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: f1-liberty-db-secret
  namespace: f1-tickets-modern
type: Opaque
stringData:
  DB_HOST: f1-external-db.f1-tickets-db.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: appdb
  DB_USER: appuser
  DB_PASSWORD: apppassword

---
# ------------------------------------------------------------------------------
# 5. ImageStream — imagen de destino construida por el BuildConfig
# ------------------------------------------------------------------------------
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: f1-liberty
  namespace: f1-tickets-modern

---
# ------------------------------------------------------------------------------
# 6. BuildConfig — construye la imagen Liberty desde GitHub usando Containerfile
# ------------------------------------------------------------------------------
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: f1-liberty
  namespace: f1-tickets-modern
spec:
  triggers:
  - type: Generic
    generic:
      secret: f1liberty2026
      allowEnv: false
  - type: ImageChange
  source:
    type: Git
    git:
      uri: https://github.com/jorgeiglesiasfernandez/f1-sales-tickets.git
      ref: java-modernization
    contextDir: "."
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: f1-liberty:latest

---
# ------------------------------------------------------------------------------
# 7. Deployment — Liberty 25 + BD externa PostgreSQL
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-liberty
  namespace: f1-tickets-modern
  labels:
    app: f1-liberty
    version: liberty-25
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"f1-liberty:latest","namespace":"f1-tickets-modern"},
        "fieldPath":"spec.template.spec.containers[?(@.name==\"f1-liberty\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: f1-liberty
  template:
    metadata:
      labels:
        app: f1-liberty
        version: liberty-25
    spec:
      containers:
      - name: f1-liberty
        image: image-registry.openshift-image-registry.svc:5000/f1-tickets-modern/f1-liberty:latest
        ports:
        - containerPort: 9080
          name: http
        - containerPort: 9443
          name: https
        envFrom:
        - secretRef:
            name: f1-liberty-db-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /f1-tickets
            port: 9080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /f1-tickets
            port: 9080
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 3

---
# ------------------------------------------------------------------------------
# 8. Service — expone el puerto HTTP de Liberty internamente
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: f1-liberty
  namespace: f1-tickets-modern
  labels:
    app: f1-liberty
spec:
  selector:
    app: f1-liberty
  ports:
  - name: http
    port: 9080
    targetPort: 9080
  - name: https
    port: 9443
    targetPort: 9443

---
# ------------------------------------------------------------------------------
# 9. Route — expone la app al exterior con TLS edge termination
#    CRC:  https://f1-tickets-modern-f1-tickets-modern.apps-crc.testing/f1-tickets
#    OCP:  https://f1-tickets-modern-f1-tickets-modern.apps.<cluster>/f1-tickets
# ------------------------------------------------------------------------------
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: f1-liberty
  namespace: f1-tickets-modern
spec:
  to:
    kind: Service
    name: f1-liberty
  port:
    targetPort: 9080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
